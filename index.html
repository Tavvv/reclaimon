    <!-- Structured data: FAQPage (matches the visible FAQ section verbatim) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "What is ReclaimOn?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ReclaimOn is an iPhone and iPad app that helps you reclaim time from distracting apps. You pick a goal, anchor it to a real time and a real place, and ReclaimOn shields the apps that pull you away for that window — every focused minute counts toward a weekly target."
            }
          },
          {
            "@type": "Question",
            "name": "How is ReclaimOn different from other app blockers?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Most blockers only count the time you resisted. ReclaimOn anchors one goal to a real time and a real place, so shields switch on when you arrive and off when you leave — and it counts the minutes you actually put in. Honest post-session reflections replace streak guilt with coach insights about what is working."
            }
          },
          {
            "@type": "Question",
            "name": "Is ReclaimOn free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — the full app is free for 21 days, the time it takes to build a habit, with no card and no account. After that you can stay on the free-forever tier (1 goal, 2 anchors, app shielding, joining Focus Pacts, and a Home Screen widget) or upgrade to ReclaimOn+ for $5.99/month or $29.99/year."
            }
          },
          {
            "@type": "Question",
            "name": "Can ReclaimOn see which apps I block or how I use my phone?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Apple's Screen Time API returns opaque tokens, so ReclaimOn can't see which apps you block or anything about your usage. Everything stays on your device — there is no account, no analytics, and no ads."
            }
          },
          {
            "@type": "Question",
            "name": "What happens after the 21-day free trial?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Nothing is deleted. You keep 1 goal and 2 anchors free forever, with app shielding, the ability to join Focus Pacts, and a small Home Screen widget. If you want unlimited goals and anchors, Focus Pact creation, the Weekly Digest, coach insights, Apple Health sync, Live Activity, and full history and trends, you can upgrade to ReclaimOn+."
            }
          },
          {
            "@type": "Question",
            "name": "Does ReclaimOn work with Apple Health and other apps?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes. With ReclaimOn+, Apple Health sync is read-only: workouts and mindful minutes logged in other apps like Strava, Calm, or Headspace count toward matching goals automatically. ReclaimOn never writes to Apple Health."
            }
          },
          {
            "@type": "Question",
            "name": "Can I use ReclaimOn with a friend?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes — Focus Pacts let you make an accountability or do-it-together pact with a friend, with check-ins and an optional shared streak. Creating a pact is a ReclaimOn+ feature, but joining a pact is always free."
            }
          }
        ]
      }
    </script>
